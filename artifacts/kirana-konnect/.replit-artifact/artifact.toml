kind = "mobile"
previewPath = "/"
title = "Kirana Konnect"
version = "1.0.0"
id = "artifacts/kirana-konnect"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25895

[services.development]
run = "pnpm --filter @workspace/kirana-konnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kirana-konnect", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/kirana-konnect", "run", "serve" ]

[services.env]
PORT = "25895"
BASE_PATH = "/"
