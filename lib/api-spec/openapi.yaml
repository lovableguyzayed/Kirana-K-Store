openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shops
    description: Shop discovery
  - name: products
    description: Product catalog
  - name: orders
    description: Order placement and lifecycle
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /shops:
    get:
      operationId: listShops
      tags: [shops]
      summary: List shops
      description: Returns all shops
      responses:
        "200":
          description: Shops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shop"
  /shops/{shopId}:
    get:
      operationId: getShop
      tags: [shops]
      summary: Get a shop
      description: Returns a single shop by id
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
        "404":
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /shops/{shopId}/products:
    get:
      operationId: listShopProducts
      tags: [products]
      summary: List a shop's products
      description: Returns all active products of a shop
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "404":
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /orders:
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Place an order
      description: Creates an order; prices are computed server-side from the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Shop or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    get:
      operationId: listOrders
      tags: [orders]
      summary: List a customer's orders
      description: Returns orders for a customer phone, newest first
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /orders/{orderId}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update an order's status
      description: Shopkeeper action; only forward transitions are allowed
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /shops/{shopId}/orders:
    get:
      operationId: listShopOrders
      tags: [orders]
      summary: List a shop's orders
      description: Returns all orders of a shop, newest first
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "404":
          description: Shop not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      description: Returns a single product by id
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    OrderStatus:
      type: string
      enum:
        - pending
        - accepted
        - packed
        - out_for_delivery
        - delivered
        - rejected
    OrderItem:
      type: object
      properties:
        productId:
          type: string
        name:
          type: string
        price:
          type: number
        unit:
          type: string
        quantity:
          type: integer
        selectedWeight:
          type: string
      required:
        - productId
        - name
        - price
        - unit
        - quantity
    Order:
      type: object
      properties:
        id:
          type: string
        shopId:
          type: string
        shopName:
          type: string
        customerPhone:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        deliveryFee:
          type: number
        status:
          $ref: "#/components/schemas/OrderStatus"
        mode:
          type: string
          enum: [pickup, delivery]
        address:
          type: string
          nullable: true
        paymentMethod:
          type: string
          enum: [cod, upi]
        placedAt:
          type: string
          format: date-time
      required:
        - id
        - shopId
        - shopName
        - customerPhone
        - items
        - total
        - deliveryFee
        - status
        - mode
        - paymentMethod
        - placedAt
    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
      required:
        - status
    PlaceOrderRequest:
      type: object
      properties:
        shopId:
          type: string
        customerPhone:
          type: string
        mode:
          type: string
          enum: [pickup, delivery]
        address:
          type: string
        paymentMethod:
          type: string
          enum: [cod, upi]
        items:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
                minimum: 1
              selectedWeight:
                type: string
            required:
              - productId
              - quantity
      required:
        - shopId
        - customerPhone
        - mode
        - paymentMethod
        - items
    Shop:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        rating:
          type: number
        openTime:
          type: string
        closeTime:
          type: string
        isOpen:
          type: boolean
        categories:
          type: array
          items:
            type: string
        image:
          type: string
          nullable: true
      required:
        - id
        - name
        - address
        - lat
        - lng
        - rating
        - openTime
        - closeTime
        - isOpen
        - categories
    Product:
      type: object
      properties:
        id:
          type: string
        shopId:
          type: string
        shopName:
          type: string
        name:
          type: string
        price:
          type: number
        unit:
          type: string
        category:
          type: string
        stock:
          type: integer
        description:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        isWeightBased:
          type: boolean
        isActive:
          type: boolean
      required:
        - id
        - shopId
        - shopName
        - name
        - price
        - unit
        - category
        - stock
        - isWeightBased
        - isActive

